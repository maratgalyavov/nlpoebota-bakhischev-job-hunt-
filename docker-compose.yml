services:
  bot:
    build: .
    container_name: hr-career-assistant-bot
    env_file:
      - .env
    environment:
      BOT_BACKEND_URL: http://backend:8000
      BOT_BACKEND_TIMEOUT_SECONDS: "600"
      PRELOAD_MODELS_ON_STARTUP: "false"
    volumes:
      - ./data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.bot.telegram_app"]
    restart: unless-stopped

  backend:
    build: .
    container_name: hr-career-assistant-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PRELOAD_MODELS_ON_STARTUP: "false"
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: hr-career-assistant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.2.0
    container_name: hr-career-assistant-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
